name: release-macos

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: apps/core/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go tests
        run: cd apps/core && go test ./...

      - name: Run frontend tests
        run: cd apps/desktop && pnpm test

      - name: Generate macOS icon assets
        run: |
          mkdir -p apps/desktop/src-tauri/icons/icon.iconset
          python3 <<'PY'
          import pathlib
          import struct
          import zlib

          out = pathlib.Path("apps/desktop/src-tauri/icons/icon.png")
          out.parent.mkdir(parents=True, exist_ok=True)
          width = height = 1024
          color = bytes((45, 106, 79, 255))
          row = color * width
          raw = b"".join(b"\x00" + row for _ in range(height))

          def chunk(tag: bytes, data: bytes) -> bytes:
              return (
                  struct.pack(">I", len(data))
                  + tag
                  + data
                  + struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF)
              )

          png = b"\x89PNG\r\n\x1a\n"
          png += chunk(b"IHDR", struct.pack(">IIBBBBB", width, height, 8, 6, 0, 0, 0))
          png += chunk(b"IDAT", zlib.compress(raw, 9))
          png += chunk(b"IEND", b"")
          out.write_bytes(png)
          PY
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" apps/desktop/src-tauri/icons/icon.png --out "apps/desktop/src-tauri/icons/icon.iconset/icon_${size}x${size}.png"
          done
          cp apps/desktop/src-tauri/icons/icon.iconset/icon_32x32.png apps/desktop/src-tauri/icons/icon.iconset/icon_16x16@2x.png
          cp apps/desktop/src-tauri/icons/icon.iconset/icon_64x64.png apps/desktop/src-tauri/icons/icon.iconset/icon_32x32@2x.png
          cp apps/desktop/src-tauri/icons/icon.iconset/icon_256x256.png apps/desktop/src-tauri/icons/icon.iconset/icon_128x128@2x.png
          cp apps/desktop/src-tauri/icons/icon.iconset/icon_512x512.png apps/desktop/src-tauri/icons/icon.iconset/icon_256x256@2x.png
          cp apps/desktop/src-tauri/icons/icon.png apps/desktop/src-tauri/icons/icon.iconset/icon_512x512@2x.png
          iconutil -c icns apps/desktop/src-tauri/icons/icon.iconset -o apps/desktop/src-tauri/icons/icon.icns

      - name: Build macOS dmg
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: cd apps/desktop && pnpm exec tauri build --bundles dmg --verbose

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mylife-macos-installer
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "mylife ${{ github.ref_name }}"
          body: "Mac installer build for mylife."
          draft: false
          prerelease: false
          files: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
