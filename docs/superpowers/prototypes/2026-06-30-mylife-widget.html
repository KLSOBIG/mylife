<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mylife 桌面小窗原型</title>
    <style>
      :root {
        --bg: #f6f4ee;
        --panel: rgba(251, 250, 246, 0.96);
        --line: #d8d3c1;
        --text: #20231d;
        --subtle: #657060;
        --accent: #55744f;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(85, 116, 79, 0.14), transparent 42%),
          linear-gradient(180deg, #faf8f3 0%, var(--bg) 100%);
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
      }

      .widget {
        width: 320px;
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(32, 35, 29, 0.12);
        overflow: hidden;
      }

      .head, .foot {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .foot {
        border-top: 1px solid var(--line);
        border-bottom: 0;
      }

      .title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }

      .muted {
        color: var(--subtle);
        font-size: 12px;
      }

      .list {
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .card {
        border: 1px solid var(--line);
        border-left: 4px solid var(--accent);
        border-radius: 14px;
        background: #fff;
        padding: 12px;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .btn, .btn-ghost {
        flex: 1;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 0;
        text-align: center;
        font-size: 12px;
      }

      .btn {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .btn-ghost {
        background: #fff;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 14px;
        padding: 22px 16px;
        text-align: center;
        color: var(--subtle);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="widget">
      <header class="head">
        <h1 class="title">今天进行中</h1>
        <div class="muted">置顶小窗。只保留轻交互。</div>
      </header>

      <section class="list">
        <article class="card">
          <h2>修复 macOS 打包流水线</h2>
          <div class="muted">提醒 17:00 · 主窗口详情可继续编辑</div>
          <div class="actions">
            <div class="btn">完成</div>
            <div class="btn-ghost">下一状态</div>
            <div class="btn-ghost">详情</div>
          </div>
        </article>

        <article class="card">
          <h2>实现桌面小窗轻交互</h2>
          <div class="muted">重复提醒 每天 09:30</div>
          <div class="actions">
            <div class="btn">完成</div>
            <div class="btn-ghost">下一状态</div>
            <div class="btn-ghost">详情</div>
          </div>
        </article>

        <div class="empty">
          空态：今天没有进行中任务。<br />
          返回主窗口选择下一项开始。
        </div>
      </section>

      <footer class="foot">
        <div class="muted">不支持：新建、拖拽、长文档编辑</div>
      </footer>
    </main>
  </body>
</html>
